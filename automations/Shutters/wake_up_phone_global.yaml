id: '1765745986629'
alias: Wake Up - Phone alarm - Global
description: >-
  Opens all shutters 2 minutes before the phone alarm rings.
  Opens bedroom only if mode_invites is on.
triggers:
  - alias: Phone alarm is within 2 minutes
    trigger: template
    value_template: >-
      {{ states('sensor.pixel_9_pro_next_alarm') not in ['unknown', 'unavailable']
         and now() >= (states('sensor.pixel_9_pro_next_alarm') | as_datetime - timedelta(minutes=2)) }}
conditions: []
actions:
  - alias: Open shutters (bedroom only if mode_invites)
    choose:
      - conditions:
          - condition: state
            entity_id: input_boolean.guest_mode
            state: "on"
        sequence:
          - alias: Guests present - open bedroom only
            action: cover.set_cover_position
            data:
              position: 100
            target:
              area_id:
                - bedroom
    default:
      - alias: Open all shutters
        action: cover.set_cover_position
        data:
          position: 100
        target:
          area_id:
            - living_room
            - office
            - kitchen
            - bedroom
mode: single
