id: '1770911000003'
alias: Remotes - Global - Button 6 - Shutter toggle
description: Button toggle - If any shutter moving → stop. If at least one not fully closed → close all. If all closed → open all. Mapping in mappings/shutters/mapping.yaml
triggers:
  - trigger: state
    entity_id: !include ../../mappings/shutters/toggle_triggers.yaml
    not_from:
      - unavailable
      - unknown
actions:
  - alias: Compute covers list and state
    variables:
      all_covers: "{{ mapping[trigger.entity_id].shutters + mapping[trigger.entity_id].sunshades }}"
      positions: "{{ all_covers | map('state_attr', 'current_position') | list }}"
      any_open: "{{ (positions | map('default', 0) | select('gt', 0) | list | length) > 0 }}"
      any_moving: "{{ (expand(all_covers) | selectattr('state', 'in', ['opening', 'closing']) | list | length) > 0 }}"
  - choose:
      - alias: Any shutter moving - stop all
        conditions:
          - condition: template
            value_template: "{{ any_moving }}"
        sequence:
          - action: cover.stop_cover
            target:
              entity_id: "{{ all_covers }}"
      - alias: At least one not closed - close all
        conditions:
          - condition: template
            value_template: "{{ any_open }}"
        sequence:
          - variables:
              covers_to_close: >-
                {% if is_state('input_boolean.wind_protection_active', 'on') %}
                  {{ mapping[trigger.entity_id].shutters }}
                {% else %}
                  {{ all_covers }}
                {% endif %}
          - if:
              - condition: template
                value_template: "{{ covers_to_close | length > 0 }}"
            then:
              - action: cover.set_cover_position
                target:
                  entity_id: "{{ covers_to_close }}"
                data:
                  position: 0
      - alias: All closed - open all
        conditions: []
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: "{{ all_covers }}"
            data:
              position: 100
mode: single
variables:
  mapping: !include ../../mappings/shutters/mapping.yaml
