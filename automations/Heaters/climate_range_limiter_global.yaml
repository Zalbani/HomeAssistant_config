id: '1771167624313'
alias: Climate - Range limiter - Global
description: Enforces global min/max limits for all radiator valves.
triggers:
  - alias: Any thermostat setpoint changed
    trigger: state
    entity_id: !include ../../mappings/heaters/thermostats.yaml
    attribute: temperature
    not_from:
      - unavailable
      - unknown
variables:
  min_limit: "{{ states('input_number.heating_global_min') | float(16) }}"
  max_limit: "{{ states('input_number.heating_global_max') | float(23) }}"
  requested_temp: "{{ trigger.to_state.attributes.temperature | float }}"
  profiles: !include ../../mappings/heaters/profiles.yaml
  window_valve_mapping: !include ../../mappings/heaters/window_valve_mapping.yaml
  window_recently_changed: >
    {% set room = profiles.thermostat_to_room.get(trigger.entity_id, none) %}
    {% if room is none %}
      {{ false }}
    {% else %}
      {% set ns = namespace(sensor=none) %}
      {% for sensor_id, cfg in window_valve_mapping.items() %}
        {% if cfg is mapping and cfg.get('room') == room %}
          {% set ns.sensor = sensor_id %}
        {% endif %}
      {% endfor %}
      {{ ns.sensor is not none and
         (now() - states[ns.sensor].last_changed).total_seconds() <= 90 }}
    {% endif %}
actions:
  - choose:
      - alias: "Too cold: clamp to min"
        conditions:
          - condition: template
            value_template: "{{ requested_temp < min_limit and not window_recently_changed }}"
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: "{{ trigger.entity_id }}"
            data:
              temperature: "{{ min_limit }}"
      - alias: "Too hot: clamp to max"
        conditions:
          - condition: template
            value_template: "{{ requested_temp > max_limit and not window_recently_changed }}"
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: "{{ trigger.entity_id }}"
            data:
              temperature: "{{ max_limit }}"
mode: parallel
