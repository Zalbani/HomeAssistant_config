cards:
  - type: custom:bubble-card
    card_type: separator
    name: System
    icon: mdi:desktop-tower

  - type: custom:mushroom-template-card
    primary: Desktop PC
    entity: switch.alban_pc_fixe
    secondary: "{% if is_state(entity, 'on') %}Online ({{ states('sensor.hass_pc_fixe_cpuload') | round(0) }}% CPU){% else %}Offline{% endif %}"
    icon: mdi:desktop-tower
    icon_color: "{% if is_state(entity, 'on') %}blue{% else %}grey{% endif %}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info

  - type: custom:bubble-card
    card_type: separator
    name: NAS Backward
    icon: mdi:nas

  - type: custom:mushroom-entity-card
    entity: sensor.backward_volume_1_volume_used
    name: Volume used
    icon: mdi:database
    fill_container: true

  - type: custom:mushroom-entity-card
    entity: sensor.backward_volume_1_used_space
    name: Used space
    icon: mdi:harddisk
    fill_container: true

  - type: custom:mushroom-entity-card
    entity: sensor.backward_download_throughput
    name: Download
    icon: mdi:download-network
    fill_container: true

  - type: custom:mushroom-entity-card
    entity: sensor.backward_upload_throughput
    name: Upload
    icon: mdi:upload-network
    fill_container: true

  - type: custom:mushroom-entity-card
    entity: sensor.backward_temperature
    name: Temperature
    icon: mdi:thermometer
    fill_container: true

  - type: custom:mushroom-update-card
    entity: update.backward_dsm_update
    name: DSM Update
    collapsible_controls: false

  - type: custom:bubble-card
    card_type: separator
    name: Plex
    icon: mdi:plex

  - type: custom:mushroom-update-card
    entity: update.plex_update
    name: Plex Update
    collapsible_controls: false

  - type: custom:mushroom-entity-card
    entity: sensor.backward_library_films
    name: Films
    icon: mdi:movie
    fill_container: true

  - type: custom:mushroom-entity-card
    entity: sensor.backward_library_series
    name: Séries
    icon: mdi:television-play
    fill_container: true

  - type: custom:mushroom-entity-card
    entity: sensor.backward_library_anim
    name: Anim'
    icon: mdi:animation-play
    fill_container: true
