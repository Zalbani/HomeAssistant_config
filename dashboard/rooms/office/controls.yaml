cards:
  - type: custom:bubble-card
    card_type: separator
    name: Light
    icon: mdi:lightbulb

  - type: custom:mushroom-light-card
    entity: light.office_ceiling_lamp_bulb
    name: Ceiling light
    icon: mdi:ceiling-light-outline
    show_brightness_control: true
    collapsible_controls: false
    tap_action:
      action: perform-action
      perform_action: switch.toggle
      target:
        entity_id: switch.office_ceiling_lamp_switch

  - type: custom:bubble-card
    card_type: separator
    name: Covers
    icon: mdi:blinds

  - type: custom:mushroom-cover-card
    entity: cover.office_sunshade
    name: Sunshade
    icon: mdi:blinds
    show_buttons_control: true
    show_position_control: true
    collapsible_controls: false

  - type: custom:bubble-card
    card_type: separator
    name: Heating
    icon: mdi:radiator

  - type: thermostat
    entity: climate.office_thermostatic_valve_thermostat

  - type: custom:bubble-card
    card_type: separator
    name: Devices
    icon: mdi:desktop-tower

  - type: custom:mushroom-template-card
    primary: Desktop PC
    entity: switch.alban_pc_fixe
    secondary: >-
      {% if is_state(entity, 'on') %}Online ({{ states('sensor.hass_pc_fixe_cpuload') | round(0) }}% CPU){% else %}Offline{% endif %}
    icon: mdi:desktop-tower
    icon_color: "{% if is_state(entity, 'on') %}blue{% else %}grey{% endif %}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info

  - type: custom:mushroom-template-card
    primary: NAS Backward
    entity: sensor.backward_cpu_utilization_total
    secondary: >-
      {% set cpu = states('sensor.backward_cpu_utilization_total') %}
      {% if cpu not in ['unavailable', 'unknown'] %}
        {% set ram_used = states('sensor.backward_memory_usage_real') | float(0) %}
        {% set ram_total = states('sensor.backward_memory_total_real') | float(1) %}
        {% set disk = states('sensor.backward_volume_1_volume_used') | round(0) %}
        CPU {{ cpu | round(0) }}% · RAM {{ (ram_used / ram_total * 100) | round(0) }}% · Disk {{ disk }}%
      {% else %}Offline{% endif %}
    icon: mdi:nas
    icon_color: >-
      {% set cpu = states('sensor.backward_cpu_utilization_total') %}
      {% if cpu not in ['unavailable', 'unknown'] %}
        {% if cpu | float(0) > 80 %}red{% else %}blue{% endif %}
      {% else %}grey{% endif %}
    tap_action:
      action: more-info
      entity: sensor.backward_cpu_utilization_total
    hold_action:
      action: more-info
      entity: sensor.backward_cpu_utilization_total

  - type: custom:bubble-card
    card_type: separator
    name: Thermometer
    icon: mdi:thermometer

  - type: custom:mushroom-entity-card
    entity: sensor.office_thermometer_temperature
    name: Temperature
    icon: mdi:thermometer
    tap_action:
      action: more-info

  - type: custom:mushroom-entity-card
    entity: sensor.office_thermometer_humidity
    name: Humidity
    icon: mdi:water-percent
    tap_action:
      action: more-info

  - type: history-graph
    entities:
      - entity: sensor.office_thermometer_temperature
        name: Temperature
      - entity: sensor.office_thermometer_humidity
        name: Humidity
    hours_to_show: 24
