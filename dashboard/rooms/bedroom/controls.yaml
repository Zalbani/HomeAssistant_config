cards:
  - type: custom:bubble-card
    card_type: separator
    name: Lights
    icon: mdi:lightbulb

  - type: custom:mushroom-light-card
    entity: light.bedroom_ceiling_lamp_bulb
    name: Ceiling lamp
    icon: mdi:ceiling-light-outline
    show_brightness_control: true
    collapsible_controls: false

  - type: custom:mushroom-light-card
    entity: light.bedroom_bed_led_strip
    name: Bed LED strip
    icon: mdi:led-strip-variant
    show_brightness_control: true
    show_color_control: true
    collapsible_controls: false

  - type: custom:bubble-card
    card_type: separator
    name: Covers
    icon: mdi:blinds

  - type: custom:mushroom-cover-card
    entity: cover.bedroom_sunshade
    name: Sunshade
    icon: mdi:blinds
    show_buttons_control: true
    show_position_control: true
    collapsible_controls: false

  - type: custom:bubble-card
    card_type: separator
    name: Heating
    icon: mdi:radiator

  - type: thermostat
    entity: climate.bedroom_thermostatic_valve_thermostat

  - type: custom:bubble-card
    card_type: separator
    name: Thermometer
    icon: mdi:thermometer

  - type: custom:mushroom-entity-card
    entity: sensor.bedroom_thermometer_temperature
    name: Temperature
    icon: mdi:thermometer
    tap_action:
      action: more-info

  - type: custom:mushroom-entity-card
    entity: sensor.bedroom_thermometer_humidity
    name: Humidity
    icon: mdi:water-percent
    tap_action:
      action: more-info

  - type: history-graph
    entities:
      - entity: sensor.bedroom_thermometer_temperature
        name: Temperature
      - entity: sensor.bedroom_thermometer_humidity
        name: Humidity
    hours_to_show: 24
