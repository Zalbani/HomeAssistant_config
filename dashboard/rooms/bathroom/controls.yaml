cards:
  - type: custom:bubble-card
    card_type: separator
    name: Light
    icon: mdi:lightbulb

  - type: custom:bubble-card
    card_type: button
    button_type: slider
    entity: switch.bathroom_ceiling_lamp_switch
    name: Ceiling light
    icon: mdi:ceiling-light-outline

  - type: custom:bubble-card
    card_type: button
    entity: switch.bathroom_mirror_switch
    name: Mirror
    icon: mdi:mirror
    tap_action:
      action: toggle

  - type: custom:bubble-card
    card_type: separator
    name: Heating
    icon: mdi:radiator

  - type: thermostat
    entity: climate.bathroom_thermostatic_valve_thermostat

  - type: custom:bubble-card
    card_type: separator
    name: Thermometer
    icon: mdi:thermometer

  - type: custom:mushroom-entity-card
    entity: sensor.bathroom_thermometer_temperature
    name: Temperature
    icon: mdi:thermometer
    tap_action:
      action: more-info

  - type: custom:mushroom-entity-card
    entity: sensor.bathroom_thermometer_humidity
    name: Humidity
    icon: mdi:water-percent
    tap_action:
      action: more-info

  - type: history-graph
    entities:
      - entity: sensor.bathroom_thermometer_temperature
        name: Temperature
      - entity: sensor.bathroom_thermometer_humidity
        name: Humidity
    hours_to_show: 24
