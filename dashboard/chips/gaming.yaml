type: conditional
conditions:
  - condition: template
    value_template: >
      {{ is_state('media_player.playstation_5', 'on') or
         states('sensor.steam_76561198135828850') not in ['offline', 'online', 'unavailable', 'unknown'] }}
chip:
  type: template
  icon: >
    {% if is_state('media_player.playstation_5', 'on') %}
      mdi:sony-playstation
    {% else %}
      mdi:steam
    {% endif %}
  icon_color: blue
  content: >
    {% if is_state('media_player.playstation_5', 'on') %}
      {{ states('sensor.zalbani_now_playing') }}
    {% else %}
      {{ states('sensor.steam_76561198135828850') }}
    {% endif %}
  tap_action:
    action: navigate
    navigation_path: /overview-dashboard/living-room
