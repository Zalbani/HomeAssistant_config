type: conditional
conditions:
  - condition: state
    entity: media_player.playstation_5
    state_not: "off"
  - condition: state
    entity: media_player.playstation_5
    state_not: "standby"
  - condition: state
    entity: media_player.playstation_5
    state_not: "unavailable"
  - condition: state
    entity: media_player.playstation_5
    state_not: "unknown"
chip:
  type: template
  entity: media_player.playstation_5
  icon: mdi:sony-playstation
  icon_color: blue
  content: "{{ state_attr('media_player.playstation_5', 'media_title') }}"
  tap_action:
    action: navigate
    navigation_path: /overview-dashboard/living-room
