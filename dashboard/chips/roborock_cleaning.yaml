type: conditional
conditions:
  - condition: state
    entity: binary_sensor.roborock_qrevo_edge_series_cleaning
    state: "on"
chip:
  type: template
  icon: mdi:robot-vacuum
  icon_color: green
  content: "{{ states('sensor.roborock_qrevo_edge_series_current_room') }}"
  tap_action:
    action: navigate
    navigation_path: /overview-dashboard/maintenance
